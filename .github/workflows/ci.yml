name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    name: Node workspaces
    runs-on: ubuntu-latest
    env:
      SOURCE_UI_STANDARD_PATH: ${{ github.workspace }}/source-int-network-standard
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Source UI Standard
        uses: actions/checkout@v6
        with:
          repository: agenticsrclab/source-int-network-standard
          path: source-int-network-standard
          # Private standard repos require this secret to have read access.
          token: ${{ secrets.SOURCE_UI_STANDARD_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify Source UI Standard
        run: |
          test -d "$SOURCE_UI_STANDARD_PATH/packages/source-ui/src" || {
            echo "Source UI standard checkout is required at SOURCE_UI_STANDARD_PATH for Symbol Cockpit sdk-native gates."
            echo "If agenticsrclab/source-int-network-standard is private, set SOURCE_UI_STANDARD_TOKEN with read access."
            exit 1
          }

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Symbol Cockpit Source UI Conformance
        run: npm run symbol-cockpit:source-ui

      - name: Build
        run: npm run build --workspaces

      - name: Check MCP Registry metadata
        run: npm --workspace @agenticsrclab/tradeos-public-intel-mcp-server run registry:check

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present

      - name: Symbol Cockpit E2E
        run: npm run symbol-cockpit:e2e

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest

      - name: Test Python SDK
        run: PYTHONPATH=packages/sdk-python/src python -m pytest packages/sdk-python/tests -q

  public-scrub:
    name: Public doc scrub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for local paths and secrets
        run: |
          ! grep -RInE '(/Users/|gmail\.com|TRADEOS_PUBLIC_INTEL_KEY=tos_pub_|VENICE_API_KEY=sk-|OPENAI_API_KEY=sk-)' \
            README.md docs apps packages examples .env.example SECURITY.md CONTRIBUTING.md
