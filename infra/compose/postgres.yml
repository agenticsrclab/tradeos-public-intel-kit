services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradeos_cockpit
      POSTGRES_USER: tradeos
      POSTGRES_PASSWORD: tradeos
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - tradeos_cockpit_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeos -d tradeos_cockpit"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tradeos_cockpit_postgres:

